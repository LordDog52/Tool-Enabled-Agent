[loggers]
keys=root,uvicorn,uvicorn.error,uvicorn.access,Agent,Guardrail

[handlers]
keys=consoleHandler,fileHandler

[formatters]
keys=simpleFormatter,uvicornFormatter

[logger_root]
level=INFO
handlers=consoleHandler

[logger_Agent]
level=DEBUG
handlers=consoleHandler,fileHandler
qualname=Agent
propagate=0

[logger_Guardrail]
level=DEBUG
handlers=consoleHandler,fileHandler
qualname=Guardrail
propagate=0

[logger_uvicorn]
level=INFO
handlers=consoleHandler,fileHandler
qualname=uvicorn
propagate=0

[logger_uvicorn.error]
level=INFO
handlers=consoleHandler
qualname=uvicorn.error
propagate=0

[logger_uvicorn.access]
level=INFO
handlers=consoleHandler,fileHandler
qualname=uvicorn.access
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=uvicornFormatter
args=(sys.stdout,)

[handler_fileHandler]
class=FileHandler
level=DEBUG
formatter=simpleFormatter
args=('src/logging/agent.log', 'a')

[formatter_simpleFormatter]
format=%(asctime)s - %(name)s - %(levelname)s - %(message)s
datefmt=%Y-%m-%d %H:%M:%S

[formatter_uvicornFormatter]
class=uvicorn.logging.DefaultFormatter
format=%(levelprefix)s %(message)s
use_colors=False